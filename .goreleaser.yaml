# goreleaser config for phi.
# Local snapshot build (no upload):  goreleaser release --snapshot --clean
# Real release: push a tag (v0.1.0); GHA workflow takes it from there.

version: 2

project_name: phi

before:
  hooks:
    - go mod tidy

builds:
  - id: phi
    main: ./cmd/phi
    binary: phi
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.buildDate={{.Date}}

archives:
  - id: phi
    format: tar.gz
    name_template: >-
      phi_{{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  name_template: '{{ incpatch .Version }}-snapshot'

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - 'Merge pull request'

release:
  github:
    owner: philtechs-org
    name: phi
  draft: false
  prerelease: auto
  name_template: 'phi {{.Tag}}'
  header: |
    See [CHANGELOG.md](https://github.com/philtechs-org/phi/blob/main/CHANGELOG.md) for the full list of changes.

    ## Install

    Linux / macOS:
    ```sh
    curl -sSL https://raw.githubusercontent.com/philtechs-org/phi/main/install.sh | sh
    ```

    Windows (PowerShell):
    ```powershell
    iwr -useb https://raw.githubusercontent.com/philtechs-org/phi/main/install.ps1 | iex
    ```

    Or grab a binary directly from the Assets below.
